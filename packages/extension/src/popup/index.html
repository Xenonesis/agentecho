<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinmark</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">
        <svg class="popup-pin" viewBox="0 0 128 128" aria-hidden="true">
          <path d="M64 118 C64 118 102 82 102 50 C102 26 86 8 64 8 C42 8 26 26 26 50 C26 82 64 118 64 118 Z" fill="#E11D48"/>
          <circle cx="64" cy="48" r="14" fill="#FFFFFF"/>
          <circle cx="64" cy="48" r="6" fill="#4338CA"/>
        </svg>
        Pinmark
      </h1>
      <span class="version">v1.0.0</span>
    </header>

    <div class="main-content">
      <div id="statusMsg" class="status-msg"></div>
      <button id="toggleBtn" class="toggle-btn">
        <span class="status-indicator"></span>
        <span class="btn-text">Activate</span>
      </button>

      <button id="copyJsonBtn" class="toggle-btn" style="margin-top: 8px; background: var(--pmk-bg-3); color: var(--pmk-text);">
        <span class="btn-text">Copy JSON</span>
      </button>

      <div id="settingsSection" class="settings-section">
        <h2 class="settings-title">Settings</h2>

        <div class="setting-item">
          <label for="markerColor">Marker Color</label>
          <input type="color" id="markerColor" value="#ef4444" class="color-input">
        </div>

        <div class="setting-item">
          <label for="outputDetail">Output Detail</label>
          <select id="outputDetail" class="select-input">
            <option value="minimal">Minimal</option>
            <option value="standard" selected>Standard</option>
            <option value="comprehensive">Comprehensive</option>
          </select>
        </div>

        <div class="setting-item">
          <label for="theme">Theme</label>
          <select id="theme" class="select-input">
            <option value="auto" selected>Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <div class="setting-item checkbox">
          <label class="checkbox-label">
            <input type="checkbox" id="clearAfterCopy">
            <span>Clear after copy</span>
          </label>
        </div>

        <div class="setting-item checkbox">
          <label class="checkbox-label">
            <input type="checkbox" id="blockInteractions">
            <span>Block page interactions</span>
          </label>
        </div>

        <div style="height: 16px;"></div>
        <h2 class="settings-title">Integrations</h2>
        
        <div class="setting-item" style="flex-direction: column; align-items: stretch; gap: 4px;">
          <label for="githubToken">GitHub PAT Token</label>
          <input type="password" id="githubToken" class="text-input" placeholder="ghp_..." style="padding: 4px; border-radius: 4px; border: 1px solid var(--pmk-border);">
        </div>
        
        <div class="setting-item" style="flex-direction: column; align-items: stretch; gap: 4px; margin-top: 8px;">
          <label for="githubRepo">GitHub Repo</label>
          <input type="text" id="githubRepo" class="text-input" placeholder="owner/repo" style="padding: 4px; border-radius: 4px; border: 1px solid var(--pmk-border);">
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.ts"></script>
</body>
</html>
