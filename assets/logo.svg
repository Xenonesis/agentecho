<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="Pinmark">
  <title>Pinmark</title>
  <style>
    .word { fill: #0A0A0A; }
    .tag  { fill: #78716C; }
    @media (prefers-color-scheme: dark) {
      .word { fill: #FAFAF9; }
      .tag  { fill: #A8A29E; }
    }
  </style>
  <!-- icon (left) -->
  <g transform="translate(20 30) scale(1.1)">
    <path d="M64 118 C64 118 102 82 102 50 C102 26 86 8 64 8 C42 8 26 26 26 50 C26 82 64 118 64 118 Z" fill="#E11D48"/>
    <path d="M50 38 C50 30 56 24 64 24 L64 16 C50 16 38 28 38 42 Z" fill="#FB7185" opacity="0.55"/>
    <circle cx="64" cy="48" r="14" fill="#FFFFFF"/>
    <circle cx="64" cy="48" r="6" fill="#4338CA"/>
  </g>
  <!-- wordmark -->
  <text x="175" y="120" class="word"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif"
        font-size="100" font-weight="800" letter-spacing="-3">Pinmark</text>
  <!-- tagline -->
  <text x="178" y="158" class="tag"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif"
        font-size="22" font-weight="500" letter-spacing="0.5">point at what&#8217;s broken &#183; hand off the Markdown</text>
</svg>